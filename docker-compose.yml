services:
  app:
    build: .
    container_name: coppy-app
    restart: unless-stopped
    ports:
      - "8712:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - APP_URL=${APP_URL:-http://localhost:3000}
      - COPPY_DEFAULT_TTL=${COPPY_DEFAULT_TTL:-3600}
      - COPPY_MAX_TTL=${COPPY_MAX_TTL:-86400}
      - COPPY_API_TOKEN=${COPPY_API_TOKEN:-}
    networks:
      - db

networks:
  db:
    external: true
